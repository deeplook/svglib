# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

# The local `mypy` hook shells out to `uv run mypy`, but pre-commit.ci's
# sandbox has no `uv` (and no project deps). mypy is already enforced there by
# the dedicated `type-check.yml` CI workflow, so skip it on pre-commit.ci.
ci:
  skip: [mypy]

repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v6.0.0
  hooks:
  - id: trailing-whitespace

- repo: https://github.com/asottile/pyupgrade
  rev: v3.21.2
  hooks:
  - id: pyupgrade
    language_version: python3.12

- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.15.22
  hooks:
  - id: ruff-format
    types_or: ["python"]
  - id: ruff
    types_or: ["python"]
    args: ["--fix"]

- repo: local
  hooks:
  - id: mypy
    name: mypy
    # Run in the project environment so deps resolve and [tool.mypy] applies.
    entry: uv run mypy src tests
    language: system
    types_or: ["python"]
    pass_filenames: false
