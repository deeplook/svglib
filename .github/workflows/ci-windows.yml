name: Run Matrix Tests on Windows
on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"  # Every Monday at 06:00 UTC
jobs:
  tests:
    name: "Python ${{ matrix.python-version }} on Windows"
    runs-on: "windows-latest"
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.13", "3.14"]
    steps:
      - uses: "actions/checkout@v4"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Create Virtual Environment
        run: uv venv

      - name: "Install dependencies"
        run: uv pip install -e . --group dev

      # test_samples.py downloads hundreds of sample SVGs from Wikipedia / W3C
      # at runtime; on a fresh Windows runner these get rate-limited and take
      # ~10 minutes. Those integration tests are platform-independent (svglib is
      # pure Python) and already run on Ubuntu and macOS, so on Windows we run
      # only the fast, deterministic unit tests to verify the library imports
      # and behaves correctly on Windows.
      - name: "Run tests for ${{ matrix.python-version }}"
        run: uv run pytest --ignore=tests/test_samples.py
