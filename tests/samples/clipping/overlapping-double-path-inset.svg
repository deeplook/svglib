<svg xmlns="http://www.w3.org/2000/svg" version="1.1" viewBox="0 0 100 50" width="100" height="50">
    <!--
        This one renders differt in chrome compared to other browsers.
        The png export is from inkscape which matches firefox and safari.
    -->
    <defs>
        <clipPath id="clip-1">
            <path d="M0,0 h40 v40 h-40 z M5,5 v22 h22 v-22 z"/>
            <path d="M 10 10 H 50 V 50 H 10 Z"/>
        </clipPath>
    </defs>
    <g>
        <rect height="50" width="100" x="0" y="0"/>
        <g clip-path="url(#clip-1)">
            <path fill="green" d="M 0 0 H 50 V 50 H 0 Z"/>
            <path fill="red" d="M 50 0 H 100 V 50 H 50 Z"/>
        </g>
    </g>
</svg>